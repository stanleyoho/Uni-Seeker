name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uni_seeker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Phase 8 V.2: AAE is PRIVATE — load deploy key into ssh-agent so
      # uv pip install can clone git+ssh://...adaptive-alpha-engine subdirectories.
      # observability-core is PUBLIC, fetched via git+https (no auth needed).
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AAE_DEPLOY_KEY }}

      # NOTE: ta-lib>=0.6.0 ships manylinux wheels that bundle the TA-Lib C
      # library, so NO `apt-get install libta-lib0-dev` step is needed on
      # ubuntu-latest (that apt package does not exist there and broke the
      # original PR #114). `uv pip install` below pulls the self-contained
      # wheel. See backend/pyproject.toml for the version pin rationale.
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: |
          ruff check app/ tests/
          ruff format --check app/ tests/

      # B6d: enforce the app's intended layering (contracts in
      # backend/pyproject.toml [tool.importlinter]). Fails the build on a
      # reverse-layer import (e.g. a domain module importing the API layer).
      - name: Import layering (import-linter)
        working-directory: backend
        run: lint-imports

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/

      - name: Test (pytest)
        working-directory: backend
        env:
          UNI_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uni_seeker_test
          UNI_REDIS_URL: redis://localhost:6379/0
          # CI-only secret — never use in production. `app.auth.jwt`
          # raises RuntimeError if unset, which gates pytest before
          # the first auth-touching test even loads.
          UNI_JWT_SECRET_KEY: ci-test-secret-do-not-use-in-prod
        run: pytest --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false
