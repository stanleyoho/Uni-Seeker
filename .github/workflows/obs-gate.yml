name: obs-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  obs-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Phase 8 V.2: pytest tests/obs/ uses backend conftest which imports
      # full app (sqlalchemy etc) — need deploy key to install AAE git+ssh deps.
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AAE_DEPLOY_KEY }}
      # TA-Lib C library required for `import talib` (transitively imported
      # by app.modules.indicators) — see backend-ci.yml for context.
      # `working-directory: backend` is the job-level default; apt-get is
      # absolute so directory doesn't matter, but be explicit.
      - name: Install TA-Lib system library
        working-directory: /
        run: |
          sudo apt-get update
          sudo apt-get install -y libta-lib0-dev
      - name: Install ruff + project deps
        run: |
          pip install ruff uv
          uv pip install --system -e ".[dev]"
      - name: ruff T20 print-detect (production paths)
        run: ruff check --select T20 .
      - name: pytest tests/obs/
        env:
          ENV: test
        run: pytest tests/obs/ -v --no-cov
      - name: Sentry DSN policy (prod only)
        env:
          ENV: ${{ vars.ENV || 'dev' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: python scripts/check_sentry_dsn.py
