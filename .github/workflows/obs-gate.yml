name: obs-gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  obs-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff + obs deps
        run: pip install ruff structlog
      - name: ruff T20 print-detect (production paths)
        run: ruff check --select T20 .
      - name: pytest tests/obs/
        env:
          ENV: test
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-asyncio || true
          pytest tests/obs/ -v
      - name: Sentry DSN policy (prod only)
        env:
          ENV: ${{ vars.ENV || 'dev' }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: python scripts/check_sentry_dsn.py
