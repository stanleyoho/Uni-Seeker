name: Postgres Integration

# E2E-2: real-Postgres integration gate. Complements `backend-ci.yml`
# (which runs the fast sqlite suite) by exercising ~30 critical-path
# tests against a real Postgres 16 plus `alembic upgrade head`. This
# is the gate that catches migration regressions, FK constraint
# misbehavior, JSONB semantic drift, and PG-only SQL (UPSERT, ENUM,
# partial indexes) that sqlite silently tolerates.

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/pg-integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/pg-integration.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pg-integration:
    runs-on: ubuntu-latest

    services:
      # GitHub Actions service container — reuses the same image and
      # health-check incantation as `backend-ci.yml::test::services::postgres`
      # so behavior matches the regular CI job byte-for-byte.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: uni_seeker_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Phase 8 V.2: AAE workspace packages live behind a deploy key.
      # Same pattern as backend-ci.yml — see that file for context.
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AAE_DEPLOY_KEY }}

      # ta-lib>=0.6.0 ships a self-contained manylinux wheel (bundles the C
      # lib) — no apt step needed; see backend-ci.yml for context.
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      # Fresh-DB bootstrap gate (K3a). Validates the *supported* way to stand
      # up an empty Postgres: `scripts/init_fresh_db.py` (Base.metadata.create_all
      # + `alembic stamp head`). This proves on real empty PG that:
      #   - the schema materialises cleanly (enums + 45 tables),
      #   - the alembic DAG resolves to a SINGLE head (the 3bcd5668fe84 merge
      #     revision unified the previous two heads UNI_PERF_001 /
      #     UNI_SIGFIRE_001 — without it `stamp head` aborts with
      #     "Multiple head revisions are present"),
      #   - the DB ends stamped at head so subsequent delta migrations apply
      #     cleanly via `alembic upgrade head`.
      #
      # KNOWN GAP (intentionally NOT closed here): a true from-empty
      # `alembic upgrade head` is still impossible. Revision `b3a1c9d2e4f5`
      # (3NF normalize) ALTERs pre-existing `stocks`/`users`/`stock_prices`/…
      # tables whose ORIGINAL pre-normalization shape no actual migration ever
      # created — those tables only ever came from create_all, and the
      # pre-normalization model definitions are not recoverable from git
      # history (the earliest committed models are already post-normalization).
      # Hand-writing that baseline would be a guess that could corrupt prod, so
      # the create_all+stamp bootstrap remains the official path. See
      # `scripts/init_fresh_db.py` docstring and the PR description.
      - name: Fresh-DB bootstrap + single-head stamp (K3a gate)
        working-directory: backend
        env:
          PGPASSWORD: postgres
          UNI_JWT_SECRET_KEY: ci-test-secret-do-not-use-in-prod
        run: |
          psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS uni_seeker_bootstrap;"
          psql -h localhost -U postgres -c "CREATE DATABASE uni_seeker_bootstrap;"
          UNI_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/uni_seeker_bootstrap \
            python scripts/init_fresh_db.py
          # Assert the DB is stamped at exactly one head and upgrade is a no-op.
          UNI_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/uni_seeker_bootstrap \
            alembic -c alembic.ini current | grep -q "(head)"
          UNI_DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/uni_seeker_bootstrap \
            alembic -c alembic.ini upgrade head

      # NOTE: the pg_integration test fixture still builds schema via
      # Base.metadata.create_all (+ manual enum creation) rather than
      # `alembic upgrade head`, because — per the KNOWN GAP above — a
      # from-empty upgrade cannot run. The bootstrap gate above is what now
      # validates the migration DAG (single head, stampable) on real PG; the
      # marked tests below still exercise PG-specific FK/JSONB/ENUM/UPSERT
      # semantics that sqlite tolerates silently.
      - name: Test (pg_integration only)
        working-directory: backend
        env:
          UNI_TEST_DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uni_seeker_test
          UNI_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/uni_seeker_test
          # CI-only secret — never use in prod. Mirrors backend-ci.yml.
          UNI_JWT_SECRET_KEY: ci-test-secret-do-not-use-in-prod
        run: pytest -m pg_integration --no-cov -v
