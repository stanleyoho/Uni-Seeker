name: E2E (Playwright)

# E2E-3: real-browser Playwright suite against a dockerized Postgres +
# backend + frontend triangle. Runs on PRs and main pushes, and is
# manually dispatchable.
#
# This workflow is intentionally separate from `frontend-ci.yml` so e2e
# flakiness (network races, browser quirks) cannot block merges of
# pure-frontend refactors. The frontend-ci gate stays sacrosanct: lint
# + tsc + build. This one adds real-browser confidence on top.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # The repo lives at $GITHUB_WORKSPACE/Uni-Seeker once we adjust the
    # checkout layout below — backend Dockerfile expects to see the
    # sibling `adaptive-alpha-engine` workspace next to Uni-Seeker.
    steps:
      - name: Checkout Uni-Seeker
        uses: actions/checkout@v4
        with:
          path: Uni-Seeker

      # AAE deploy key: backend Dockerfile copies `adaptive-alpha-engine/
      # packages/{backtesting_core,prediction_engine}` so we need the
      # sibling repo on disk. webfactory/ssh-agent loads the secret into
      # the ambient SSH agent so the subsequent `git clone` succeeds.
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AAE_DEPLOY_KEY }}

      - name: Checkout adaptive-alpha-engine (sibling workspace)
        run: |
          # The build context for backend-e2e is "..", so AAE must live
          # right next to Uni-Seeker. Mirrors the monorepo layout on
          # Stanley's machine.
          git clone --depth 1 git@github.com:stanleyoho/adaptive-alpha-engine.git adaptive-alpha-engine

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Uni-Seeker/frontend/package-lock.json

      - name: Install frontend deps (for Playwright runner only)
        working-directory: Uni-Seeker/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: Uni-Seeker/frontend
        # --with-deps pulls the OS libs chromium needs on ubuntu-latest.
        run: npx playwright install --with-deps chromium

      # Compose orchestration. The compose file lives at Uni-Seeker root,
      # but its build context is "..", which is the workspace root. The
      # current working directory matters: we run from Uni-Seeker so
      # relative paths line up with how Stanley runs it locally.
      - name: Build & start the e2e stack
        working-directory: Uni-Seeker
        run: |
          docker compose -f docker-compose.e2e.yml build
          # `--wait` blocks until every service is healthy (or the
          # one-shot seed exits 0). Health-check definitions are in
          # docker-compose.e2e.yml.
          docker compose -f docker-compose.e2e.yml up -d --wait
          docker compose -f docker-compose.e2e.yml ps

      - name: Sanity-probe the backend OpenAPI
        run: |
          # If this 404s the seed didn't run or the backend crashed at
          # startup — bail fast with diagnostic logs.
          curl --fail --silent --show-error http://localhost:8001/api/openapi.json > /dev/null \
            || { docker compose -f Uni-Seeker/docker-compose.e2e.yml logs backend-e2e e2e-seed db-e2e; exit 1; }

      - name: Run Playwright (E2E_TARGET=docker)
        id: playwright
        working-directory: Uni-Seeker/frontend
        env:
          E2E_TARGET: docker
          # Used inside fixtures/auth.ts when the spec calls
          # loginAgainstE2EBackend(). Mirrors backend-e2e host port.
          E2E_BACKEND_URL: http://localhost:8001/api/v1
        run: npx playwright test

      - name: Collect compose logs on failure
        if: failure()
        working-directory: Uni-Seeker
        # Useful for the typical "backend crashed at startup" case where
        # the playwright failures are downstream of a real bug.
        run: docker compose -f docker-compose.e2e.yml logs --no-color > compose-logs.txt || true

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            Uni-Seeker/frontend/playwright-report/
            Uni-Seeker/frontend/test-results/
            Uni-Seeker/compose-logs.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Tear down
        if: always()
        working-directory: Uni-Seeker
        # `down -v` wipes the named volume so any cached schema state
        # cannot leak into the next run (e.g. re-tries of the same PR).
        run: docker compose -f docker-compose.e2e.yml down -v
