name: Schema Contract Gate

# Detect Backend ↔ Frontend OpenAPI schema drift.
# Triggers when backend schemas/api or the generated TS file change.

on:
  push:
    branches: [main]
    paths:
      - "backend/app/schemas/**"
      - "backend/app/api/**"
      - "backend/app/main.py"
      - "frontend/src/lib/api/generated/schema.d.ts"
      - "frontend/scripts/gen-api-types.sh"
      - ".github/workflows/schema-gate.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/app/schemas/**"
      - "backend/app/api/**"
      - "backend/app/main.py"
      - "frontend/src/lib/api/generated/schema.d.ts"
      - "frontend/scripts/gen-api-types.sh"
      - ".github/workflows/schema-gate.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Backend depends on private AAE repo (see backend-ci.yml).
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AAE_DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ta-lib>=0.6.0 ships a self-contained manylinux wheel (bundles the C
      # lib) — no apt step needed; see backend-ci.yml for context.
      - name: Install backend
        working-directory: backend
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      - name: Install frontend
        working-directory: frontend
        run: npm ci

      - name: Dump OpenAPI spec from FastAPI app
        working-directory: backend
        env:
          # create_app() touches app.auth.jwt at import time; supply a dummy.
          UNI_JWT_SECRET_KEY: ci-test-secret-do-not-use-in-prod
        run: |
          python -c "import json; from app.main import create_app; print(json.dumps(create_app().openapi()))" > /tmp/openapi.json
          echo "openapi.json size: $(wc -c < /tmp/openapi.json) bytes"

      - name: Regenerate TypeScript types
        working-directory: frontend
        run: npx --no-install openapi-typescript /tmp/openapi.json --output src/lib/api/generated/schema.d.ts

      - name: Check for schema drift
        run: |
          if ! git diff --exit-code frontend/src/lib/api/generated/schema.d.ts; then
            echo ""
            echo "::error::Frontend schema.d.ts is stale relative to backend OpenAPI spec."
            echo "::error::Backend Pydantic / route changes were not reflected in the generated TS types."
            echo "::error::Fix locally: (1) start backend on :8000, (2) cd frontend && npm run gen:api-types, (3) commit schema.d.ts."
            exit 1
          fi
          echo "✅ schema.d.ts is in sync with backend OpenAPI spec."
