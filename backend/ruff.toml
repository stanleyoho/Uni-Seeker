target-version = "py312"
line-length = 100

[lint]
select = [
    "F",      # pyflakes
    "E", "W", # pycodestyle
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # ruff-specific
    "PT",     # flake8-pytest-style
]
allowed-confusables = ["：", "（", "）"]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "ARG", "PLR2004"]

[lint.isort]
known-first-party = ["app"]
