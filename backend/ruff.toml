target-version = "py312"
line-length = 100

[lint]
select = [
    "F",      # pyflakes
    "E", "W", # pycodestyle
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # ruff-specific
    "PT",     # flake8-pytest-style
    "DTZ",    # flake8-datetimez
    "T20",    # flake8-print (Plan 8 T11: no print() in production)
]
# Project-wide rule suppressions (added Phase 8 V.3, 2026-05-24):
# - N802: FastAPI route handlers + SQLAlchemy override methods (e.g. _visit_JSONB)
#         + test functions like test_WalkForwardValidator_init_kwargs intentionally
#         mirror class names — snake_case 強制違反設計意圖
# - RUF001/002/003: 中文字 / EN-DASH / 全形符號 in strings/docstrings/comments are
#         intentional (Stanley's primary language is zh-TW). The "ambiguous" warnings
#         are signal-zero in this codebase.
# TC001/002/003 disabled project-wide: FastAPI Annotated[..., Depends(...)] +
# SQLAlchemy 2.0 Mapped[X] need runtime-visible types. Moving them into
# TYPE_CHECKING blocks breaks DI resolution and ORM reflection across the
# codebase (verified empirically — 2026-05-24 attempt broke 164 tests).
# DTZ011 (call-date-today) disabled: `date.today()` returns the user's local
# calendar date which is the semantically correct "today" for analytics /
# snapshots / trade date defaults. Forcing `datetime.now(tz=UTC).date()`
# silently shifts the calendar date when local TZ ≠ UTC (verified empirically
# — 2026-05-24 attempt broke 4 analytics tests in TW=UTC+8 timezone). DTZ002
# (datetime.today) and DTZ007 (strptime sans %z) remain enabled — those are
# broker-parser locality issues that need per-broker semantic decisions.
ignore = ["N802", "RUF001", "RUF002", "RUF003", "TC001", "TC002", "TC003", "DTZ011"]
allowed-confusables = ["：", "（", "）"]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "ARG", "PLR2004", "DTZ", "T20"]
"**/__init__.py" = ["F401"]  # re-exports intentional
"**/conftest.py" = ["DTZ"]
"scripts/**" = ["T20"]
"alembic/**" = ["DTZ", "T20"]

[lint.isort]
known-first-party = ["app"]

# B008 (function-call-in-default-argument) doesn't understand FastAPI's
# dependency-injection pattern. `Depends(...)` / `Query(...)` / `Body(...)` /
# `HTTPBearer()` etc are required to appear in argument defaults — that's how
# FastAPI's DI resolves them. Auth helpers built on top of `Depends` (e.g.
# `require_tier`, `require_risk_tolerance`) are the same shape.
[lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Body",
    "fastapi.Path",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.File",
    "fastapi.Form",
    "fastapi.security.HTTPBearer",
    "app.auth.require_risk_tolerance",
    "app.modules.billing.tier_limits.require_tier",
    "app.modules.billing.tier_limits.tier_guard",
]
