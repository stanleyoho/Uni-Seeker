target-version = "py312"
line-length = 100

[lint]
select = [
    "F",      # pyflakes
    "E", "W", # pycodestyle
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # ruff-specific
    "PT",     # flake8-pytest-style
    "DTZ",    # flake8-datetimez
    "T20",    # flake8-print (Plan 8 T11: no print() in production)
]
allowed-confusables = ["：", "（", "）"]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "ANN", "ARG", "PLR2004", "DTZ", "T20"]
"**/conftest.py" = ["DTZ"]
"scripts/**" = ["T20"]
"alembic/**" = ["DTZ", "T20"]

[lint.isort]
known-first-party = ["app"]
