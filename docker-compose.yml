services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-uni_seeker}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    # Build from monorepo root so backtesting_core path dependency resolves.
    build:
      context: ..
      dockerfile: Uni-Seeker/backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      UNI_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-uni_seeker}
      UNI_REDIS_URL: redis://redis:6379/0
      UNI_JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      UNI_FINMIND_API_TOKEN: ${FINMIND_API_TOKEN:-}
      UNI_TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      UNI_TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload: mount backend AND both shared packages over the
      # in-image copies. Both backtesting_core and prediction_engine are
      # path deps in backend/pyproject.toml [tool.uv.sources]; without
      # both mounts, edits to prediction_engine require a full rebuild.
      - ./backend:/workspace/Uni-Seeker/backend
      - ../adaptive-alpha-engine/packages/backtesting_core:/workspace/adaptive-alpha-engine/packages/backtesting_core
      - ../adaptive-alpha-engine/packages/prediction_engine:/workspace/adaptive-alpha-engine/packages/prediction_engine

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://backend:8000/api/v1}
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
