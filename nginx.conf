# Production reverse proxy for Uni-Seeker.
#
# Routing (matches docker-compose.prod.yml service names + ports):
#   /api/        -> backend  (FastAPI, uvicorn :8000)
#   /docs        -> backend  (OpenAPI UI)
#   everything   -> frontend (Next.js SSR :3000)
#
# Mounted at /etc/nginx/conf.d/default.conf by the `nginx` service.

# Per-client rate-limit budgets. `auth` is tighter (brute-force surface).
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

# Map the Connection header so WebSocket upgrades (Next.js dev HMR + any SSE)
# pass through, while normal requests get a keep-alive connection.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Upload ceiling — generous enough for CSV portfolio imports, bounded so a
    # client can't stream an unbounded body at the proxy.
    client_max_body_size 10m;

    # Security headers (apply to every response, including errors).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression for text payloads.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ── shared proxy defaults ────────────────────────────────────────────────
    # Forward the real client identity + scheme so the backend sees the origin
    # request, not the proxy. `proxy_set_header Connection ""` is overridden in
    # the upgrade-aware location blocks below.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Timeouts — a slow upstream (e.g. a backend pulling from FinMind/yfinance)
    # must not hold a worker forever; 60s is comfortably above normal API
    # latency while still bounding the tail.
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ── backend: auth (tighter rate limit) ──────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend;
    }

    # ── backend: API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://backend;
    }

    # ── backend: OpenAPI docs ────────────────────────────────────────────────
    location /docs {
        proxy_pass http://backend;
    }

    # ── Prometheus metrics — backend, not exposed to the public internet ─────
    # Restrict to private networks; the metrics scraper runs inside the
    # compose/cluster network. Adjust the CIDR to your deployment.
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend;
    }

    # ── frontend: long-cache immutable Next.js build assets ──────────────────
    # `/_next/static/*` is content-hashed by the Next build, so it is safe to
    # cache aggressively at the client.
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_set_header Connection "";
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── frontend: health probe ───────────────────────────────────────────────
    location /health {
        proxy_pass http://frontend;
    }

    # ── frontend: SSR + everything else (WebSocket/HMR aware) ────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
